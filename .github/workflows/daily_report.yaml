name: Reporte Diario ICA

on:
  schedule:
    # 22:58 UTC = 16:45 México (horario de verano) o 17:58 estándar
    - cron: "40 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        env:
          USUARIO: ${{ secrets.USUARIO }}
          CONTRASENA: ${{ secrets.CONTRASENA }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO_1: ${{ secrets.EMAIL_TO_1 }}
          EMAIL_TO_2: ${{ secrets.EMAIL_TO_2 }}
          EMAIL_TO_3: ${{ secrets.EMAIL_TO_3 }}
        run: python scraper.py

      - name: Copiar PDF a carpeta reportes
        run: |
          mkdir -p reportes
          cp descargas_*/"Reporte diario (calidad del aire)"*.pdf reportes/ || echo "No se encontró PDF"

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit y push del reporte
        run: |
          git add reportes/
          git commit -m "Agrega reporte diario $(date +'%Y-%m-%d')" || echo "No hay cambios para commit"
          git push
